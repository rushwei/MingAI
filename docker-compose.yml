services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:?NEXT_PUBLIC_SUPABASE_URL is required for web image build}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY is required for web image build}"
    image: mingai-web:latest
    container_name: mingai-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:3000"

  mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    image: mingai-mcp:latest
    container_name: mingai-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      MCP_HOST: "0.0.0.0"
      MCP_ALLOWED_ORIGINS: "${MCP_ALLOWED_ORIGINS:-}"
      MCP_MAX_SESSIONS: "${MCP_MAX_SESSIONS:-1000}"
      MCP_SESSION_TTL_MS: "${MCP_SESSION_TTL_MS:-1800000}"
      MCP_SESSION_IDLE_MS: "${MCP_SESSION_IDLE_MS:-600000}"
      MCP_MAX_SSE_PER_USER: "${MCP_MAX_SSE_PER_USER:-3}"
      MCP_TRUST_PROXY: "${MCP_TRUST_PROXY:-false}"
    ports:
      - "${MCP_PORT:-3001}:3001"
