name: reminders-cron

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # 每小时执行一次

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Process scheduled reminders
        run: |
          curl --fail-with-body -sS -X GET "${{ secrets.CRON_BASE_URL }}/api/cron/process-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
