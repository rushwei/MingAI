services:
  mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    image: mingai-mcp:latest
    container_name: mingai-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      MCP_JWT_SECRET: "${MCP_JWT_SECRET:-}"
      MCP_ISSUER_URL: "${MCP_ISSUER_URL:-https://mcp.mingai.fun}"
      MCP_ALLOWED_TOKEN_AUDIENCES: "${MCP_ALLOWED_TOKEN_AUDIENCES:-}"
    ports:
      - "${MCP_PORT:-3001}:3001"
