services:
  mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    image: mingai-mcp:latest
    container_name: mingai-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      MCP_JWT_SECRET: "${MCP_JWT_SECRET:-}"
      MCP_ISSUER_URL: "${MCP_ISSUER_URL:-https://mcp.mingai.fun}"
      MCP_ALLOWED_TOKEN_AUDIENCES: "${MCP_ALLOWED_TOKEN_AUDIENCES:-}"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      SUPABASE_SYSTEM_ADMIN_EMAIL: "${SUPABASE_SYSTEM_ADMIN_EMAIL}"
      SUPABASE_SYSTEM_ADMIN_PASSWORD: "${SUPABASE_SYSTEM_ADMIN_PASSWORD}"
      MCP_HOST: "0.0.0.0"
      MCP_ALLOWED_ORIGINS: "${MCP_ALLOWED_ORIGINS:-}"
      MCP_ALLOWED_HOSTS: "${MCP_ALLOWED_HOSTS:-}"
      MCP_MAX_SESSIONS: "${MCP_MAX_SESSIONS:-1000}"
      MCP_SESSION_TTL_MS: "${MCP_SESSION_TTL_MS:-1800000}"
      MCP_SESSION_IDLE_MS: "${MCP_SESSION_IDLE_MS:-600000}"
      MCP_MAX_SSE_PER_USER: "${MCP_MAX_SSE_PER_USER:-3}"
      MCP_TRUST_PROXY: "${MCP_TRUST_PROXY:-false}"
    ports:
      - "${MCP_PORT:-3001}:3001"
